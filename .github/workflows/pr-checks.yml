name: PR Checks

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/clang-format-check@main
        with:
          SOURCES: "src/ include/"

  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
            preset: desktop-debug
          - name: macOS-arm64
            os: macos-15
            preset: desktop-debug
          - name: macOS-x86_64
            os: macos-15
            preset: macos-x64-debug
          - name: Windows-x86_64
            os: windows-2025
            preset: windows-debug
          - name: iOS-Simulator
            os: macos-26
            preset: ios-simulator-debug
          - name: Android-x86_64
            os: ubuntu-24.04
            preset: android-emulator-debug
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: nttld/setup-ndk@v1
        if: ${{ contains(matrix.name, 'Android') }}
        with:
          ndk-version: r27b
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/clang-tidy-check@main
        if: ${{ matrix.name == 'Linux-x86_64' }}
        with:
          SOURCES: "src/ test/"
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/cmake-test@main
        if: ${{ !contains(matrix.name, 'Android') && !contains(matrix.name, 'iOS') }}
        with:
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/cmake-test-ios-simulator@main
        if: ${{ contains(matrix.name, 'iOS') }}
        with:
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/cmake-test-android@main
        if: ${{ contains(matrix.name, 'Android') }}
        with:
          PRESET: ${{ matrix.preset }}

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android-arm64
            os: ubuntu-24.04
            preset: android-debug
          - name: Windows-ARM64
            os: windows-2025
            preset: windows-arm64-debug
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: nttld/setup-ndk@v1
        if: ${{ contains(matrix.name, 'Android') }}
        with:
          ndk-version: r27b
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: ${{ matrix.preset }}

  sanitizer-asan:
    name: ASan/UBSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-asan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-asan

  sanitizer-tsan:
    name: TSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-tsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-tsan

  sanitizer-lsan:
    name: LSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-lsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-lsan

  sanitizer-rtsan:
    name: RTSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-rtsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-rtsan
