name: PR Checks

on: [push]

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/clang-format-check@main
        with:
          SOURCES: "src/ include/"

  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
            preset: desktop-debug
          - name: macOS-arm64
            os: macos-15
            preset: desktop-debug
          - name: Windows-x86_64
            os: windows-2025
            preset: windows-debug
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/clang-tidy-check@main
        if: ${{ matrix.name != 'Windows-x86_64' }}
        with:
          SOURCES: "src/"
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: ${{ matrix.preset }}

  sanitizer-asan:
    name: ASan/UBSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-asan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-asan

  sanitizer-tsan:
    name: TSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-tsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-tsan

  sanitizer-lsan:
    name: LSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-lsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-lsan

  sanitizer-rtsan:
    name: RTSan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-rtsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-rtsan
