name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/clang-format-check@main
        with:
          SOURCES: "src/ include/"

  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-latest
            preset: desktop-debug
          - name: macOS-arm64
            os: macos-latest
            preset: desktop-debug
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/clang-tidy-check@main
        with:
          SOURCES: "src/"
          PRESET: ${{ matrix.preset }}
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: ${{ matrix.preset }}

  sanitizer-asan:
    name: ASan/UBSan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-asan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-asan

  sanitizer-tsan:
    name: TSan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-tsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-tsan

  sanitizer-rtsan:
    name: RTSan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/cmake-build@main
        with:
          PRESET: desktop-debug-rtsan
      - uses: tanh-lab/ci-actions/cmake-test@main
        with:
          PRESET: desktop-debug-rtsan
